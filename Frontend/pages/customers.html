<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Velora</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/crm.css">
    <link rel="stylesheet" href="/css/loading.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dash-body">

  <!-- ── NAV MÓVIL ── -->
  <nav class="mobile-nav">
    <ul class="mobile-nav-list">
      <li><a href="/pages/dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Inicio</span></a></li>
      <li><a href="/pages/appointments.html" class="mobile-nav-item"><i data-lucide="calendar"></i><span>Citas</span></a></li>
      <li><a href="/pages/services.html" class="mobile-nav-item"><i data-lucide="wrench"></i><span>Servicios</span></a></li>
      <li><a href="/pages/customers.html" class="mobile-nav-item active"><i data-lucide="users"></i><span>Clientes</span></a></li>
      <li><a href="/pages/settings.html" class="mobile-nav-item"><i data-lucide="settings"></i><span>Ajustes</span></a></li>
    </ul>
  </nav>

  <div class="dash-layout">
        <aside class="dash-sidebar">
            <div class="logo">
                <span class="logo-text">Velora</span>
            </div>
            <nav class="dash-nav">
                <a href="/pages/dashboard.html" class="dash-nav-link">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Panel de control</span>
                </a>
                <a href="/pages/appointments.html" class="dash-nav-link">
                    <i data-lucide="calendar"></i>
                    <span>Citas</span>
                </a>
                <a href="/pages/services.html" class="dash-nav-link">
                    <i data-lucide="wrench"></i>
                    <span>Servicios</span>
                </a>
                <a href="/pages/customers.html" class="dash-nav-link active">
                    <i data-lucide="users"></i>
                    <span>Clientes</span>
                </a>
                <a href="/pages/settings.html" class="dash-nav-link">
                    <i data-lucide="settings"></i>
                    <span>Configuración</span>
                </a>
            </nav>
            <div class="dash-sidebar-bottom" style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.04);">
                <button class="dash-nav-link dash-logout" onclick="logout()">
                    <i data-lucide="log-out"></i>
                    <span>Cerrar sesión</span>
                </button>
            </div>
        </aside>

        <main class="dash-main">
            <div class="customer-container">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                    <div>
                        <h1 style="margin-bottom: 8px;">Gestión de Clientes</h1>
                        <p class="text-secondary">Visualiza el historial y fideliza a tus usuarios.</p>
                    </div>
                </div>

                <div class="customer-grid">
                    <div class="customer-list-section">
                        <div class="search-wrapper">
                            <i data-lucide="search"></i>
                            <input type="text" id="custSearch" class="search-input" placeholder="Buscar por nombre o email..." oninput="filterCustomers()">
                        </div>
                        <div id="customersList" class="customers-scroll-area">
                            <p style="text-align: center; color: var(--text-muted); margin-top: 40px;">Cargando clientes...</p>
                        </div>
                    </div>

                    <div id="customerDetail" class="detail-panel">
                        <div style="text-align: center; color: var(--text-muted); margin: auto;">
                            <div class="detail-avatar-large" style="background: var(--bg-secondary); color: var(--text-muted);">
                                <i data-lucide="user"></i>
                            </div>
                            <h3>Sin selección</h3>
                            <p>Toca a un cliente de la lista para gestionar su perfil y notas.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/apiService.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/customers.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
